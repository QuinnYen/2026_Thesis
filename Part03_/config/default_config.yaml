data_settings:
  input_directories:
    amazon: ./ReviewsDataBase/Amazon/
    yelp: ./ReviewsDataBase/Yelp/
    imdb: ./ReviewsDataBase/IMDB/
  output_directory: ./Part03_/results/
  temp_directory: ./Part03_/temp/
model_settings:
  bert:
    model_name: bert-base-chinese
    cache_dir: ./Part03_/models/bert
    max_length: 128
    batch_size: 16
  lda:
    num_topics: 10
    passes: 15
    alpha: auto
    workers: 4
processing:
  use_cuda: true
  num_workers: 4
  cache_embeddings: true
logging:
  log_level: INFO
  log_dir: ./Part03_/logs/
  console_output: true
gui:
  theme: light
  language: zh_TW
  auto_save: true
  chart_style: seaborn
